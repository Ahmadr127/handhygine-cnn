<script>
/* ============================================================
   UTILITIES
   ============================================================ */
const e = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ============================================================
   SEQUENCE DIAGRAM RENDERER
   ============================================================
   participants: [{label, type}]  type: 'actor'|'comp'|'db'
   messages:    [{from, to, label, isReturn?, isSelf?}]
*/
function seqSVG({name, participants, messages}){
  const PS=158, FX=88, HH=110, MH=60, PB=50, BW=128, BH=44;
  const N=participants.length, M=messages.length;
  const W=FX*2+(N-1)*PS, H=HH+M*MH+PB;
  const px=i=>FX+i*PS;
  const my=i=>HH+(i+.5)*MH;
  let s='';
  const a=x=>s+=x;

  a(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);
  a(`<rect x=".5" y=".5" width="${W-1}" height="${H-1}" fill="white" stroke="#999" stroke-width="1.5"/>`);
  const tw=22+name.length*6.3;
  a(`<rect x="0" y="0" width="${tw}" height="20" fill="white" stroke="#999" stroke-width="1"/>`);
  a(`<text x="6" y="14" font-family="Arial" font-size="11" fill="#333">sd ${e(name)}</text>`);
  a(`<defs>
    <marker id="mS_${name}" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0,0 0,9 9,4.5" fill="#333"/></marker>
    <marker id="mR_${name}" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0,0 0,9 9,4.5" fill="#999"/></marker>
  </defs>`);

  participants.forEach((p,i)=>{
    const cx=px(i);
    if(p.type==='actor'){
      const hy=28,r=12;
      a(`<circle cx="${cx}" cy="${hy}" r="${r}" fill="none" stroke="#333" stroke-width="1.5"/>`);
      a(`<line x1="${cx}" y1="${hy+r}" x2="${cx}" y2="${hy+r+28}" stroke="#333" stroke-width="1.5"/>`);
      a(`<line x1="${cx-17}" y1="${hy+r+14}" x2="${cx+17}" y2="${hy+r+14}" stroke="#333" stroke-width="1.5"/>`);
      a(`<line x1="${cx}" y1="${hy+r+28}" x2="${cx-13}" y2="${hy+r+47}" stroke="#333" stroke-width="1.5"/>`);
      a(`<line x1="${cx}" y1="${hy+r+28}" x2="${cx+13}" y2="${hy+r+47}" stroke="#333" stroke-width="1.5"/>`);
      p.label.split('\n').forEach((l,li)=>a(`<text x="${cx}" y="${hy+r+62+li*14}" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#222">${e(l)}</text>`));
      a(`<line x1="${cx}" y1="${HH}" x2="${cx}" y2="${H-PB+18}" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>`);
    } else if(p.type==='db'){
      const bx=cx-BW/2,by=26,eh=8;
      a(`<rect x="${bx}" y="${by+eh}" width="${BW}" height="${BH}" fill="#e0f0f8" stroke="#4A8AAF" stroke-width="1.5"/>`);
      a(`<ellipse cx="${cx}" cy="${by+eh}" rx="${BW/2}" ry="${eh}" fill="#c4dcf0" stroke="#4A8AAF" stroke-width="1.5"/>`);
      a(`<ellipse cx="${cx}" cy="${by+BH+eh}" rx="${BW/2}" ry="${eh}" fill="#e0f0f8" stroke="#4A8AAF" stroke-width="1"/>`);
      p.label.split('\n').forEach((l,li,arr)=>{
        const ly=by+eh+BH/2+(li-(arr.length-1)/2)*13;
        a(`<text x="${cx}" y="${ly}" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a3a52">${e(l)}</text>`);
      });
      a(`<line x1="${cx}" y1="${by+BH+eh*2+1}" x2="${cx}" y2="${H-PB+18}" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>`);
    } else {
      const bx=cx-BW/2,by=26;
      a(`<rect x="${bx}" y="${by}" width="${BW}" height="${BH}" fill="#BFDBEE" stroke="#4A8AAF" stroke-width="1.5" rx="3"/>`);
      p.label.split('\n').forEach((l,li,arr)=>{
        const ly=by+BH/2+(li-(arr.length-1)/2)*13;
        a(`<text x="${cx}" y="${ly}" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1a3a52">${e(l)}</text>`);
      });
      a(`<line x1="${cx}" y1="${by+BH}" x2="${cx}" y2="${H-PB+18}" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>`);
    }
  });

  messages.forEach((msg,i)=>{
    const fx=px(msg.from),tx=px(msg.to),y=my(i);
    const isR=msg.isReturn||false;
    const clr=isR?'#888':'#333', dash=isR?'6,3':'none';
    const mk=isR?`url(#mR_${name})`:`url(#mS_${name})`;
    if(msg.from===msg.to){
      a(`<path d="M${fx+5},${y} C${fx+50},${y-5} ${fx+50},${y+22} ${fx+5},${y+22}" fill="none" stroke="${clr}" stroke-width="1.3" stroke-dasharray="${dash}" marker-end="${mk}"/>`);
      a(`<text x="${fx+55}" y="${y+13}" font-family="Arial" font-size="10" fill="#333">${e(msg.label)}</text>`);
    } else {
      const dir=fx<tx?-1:1, ex=tx+dir*7;
      a(`<line x1="${fx}" y1="${y}" x2="${ex}" y2="${y}" stroke="${clr}" stroke-width="1.3" stroke-dasharray="${dash}" marker-end="${mk}"/>`);
      const mx=(fx+tx)/2;
      a(`<text x="${mx}" y="${y-6}" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">${e(msg.label)}</text>`);
    }
  });
  a(`</svg>`); return s;
}

/* ============================================================
   ACTIVITY DIAGRAM RENDERER
   ============================================================
   lanes: [string]
   steps: [{id, type, lane, label}]  type: start|action|decision|end
   flows: [{from, to, label?, side?}]  side=true: exit from side of diamond
*/
function actSVG({name, lanes, steps, flows}){
  const LW=225, LHH=42, SH=74, PBM=30, AW=178, AH=48, ARX=14;
  const NL=lanes.length, NS=steps.length;
  const W=NL*LW+2, H=LHH+20+NS*SH+PBM;
  const lcx=i=>1+i*LW+LW/2;

  const pos={};
  steps.forEach((st,i)=>{pos[st.id]={x:lcx(st.lane),y:20+LHH+(i+.5)*SH};});

  let s='';
  const a=x=>s+=x;
  a(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);
  a(`<rect x=".5" y=".5" width="${W-1}" height="${H-1}" fill="white" stroke="#999" stroke-width="1.5"/>`);
  const tw=22+name.length*6.3;
  a(`<rect x="0" y="0" width="${tw}" height="20" fill="white" stroke="#999" stroke-width="1"/>`);
  a(`<text x="6" y="14" font-family="Arial" font-size="11" fill="#333">act ${e(name)}</text>`);
  a(`<defs><marker id="aA_${name}" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0,0 0,9 9,4.5" fill="#333"/></marker></defs>`);

  lanes.forEach((ln,i)=>{
    const lx=1+i*LW;
    a(`<rect x="${lx}" y="20" width="${LW}" height="${LHH}" fill="#eeeeee" stroke="#bbb" stroke-width="1"/>`);
    a(`<text x="${lcx(i)}" y="${20+LHH/2+5}" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">${e(ln)}</text>`);
  });
  for(let i=1;i<NL;i++){
    const dx=1+i*LW;
    a(`<line x1="${dx}" y1="${20+LHH}" x2="${dx}" y2="${H-1}" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>`);
  }

  steps.forEach(st=>{
    const {x,y}=pos[st.id];
    if(st.type==='start'){
      a(`<circle cx="${x}" cy="${y}" r="13" fill="#333"/>`);
    } else if(st.type==='end'){
      a(`<circle cx="${x}" cy="${y}" r="17" fill="none" stroke="#333" stroke-width="2.5"/>`);
      a(`<circle cx="${x}" cy="${y}" r="11" fill="#333"/>`);
    } else if(st.type==='action'){
      const bx=x-AW/2,by=y-AH/2;
      a(`<rect x="${bx}" y="${by}" width="${AW}" height="${AH}" fill="#FFFDE7" stroke="#bbb" stroke-width="1.5" rx="${ARX}"/>`);
      const lines=(st.label||'').split('\n');
      const lh=16,ly0=y-(lines.length-1)*lh/2;
      lines.forEach((l,li)=>a(`<text x="${x}" y="${ly0+li*lh}" text-anchor="middle" font-family="Arial" font-size="11" fill="#222">${e(l)}</text>`));
    } else if(st.type==='decision'){
      const dw=96,dh=50;
      a(`<polygon points="${x},${y-dh/2} ${x+dw/2},${y} ${x},${y+dh/2} ${x-dw/2},${y}" fill="#FFFDE7" stroke="#bbb" stroke-width="1.5"/>`);
      const lines=(st.label||'').split('\n');
      const lh=14,ly0=y-(lines.length-1)*lh/2;
      lines.forEach((l,li)=>a(`<text x="${x}" y="${ly0+li*lh}" text-anchor="middle" font-family="Arial" font-size="10" fill="#222">${e(l)}</text>`));
    }
  });

  const mk=`url(#aA_${name})`;
  flows.forEach(fl=>{
    if(!pos[fl.from]||!pos[fl.to]) return;
    const {x:fx,y:fy}=pos[fl.from],{x:tx,y:ty}=pos[fl.to];
    const fst=steps.find(s=>s.id===fl.from),tst=steps.find(s=>s.id===fl.to);
    const lbl=fl.label||'';

    let sy=fy,ey=ty,sx=fx,ex=tx;
    // Start offsets
    if(fl.side){sy=fy;sx=(fl.sideLeft?fx-48:fx+48);}
    else if(fst.type==='start')sy+=13;
    else if(fst.type==='action')sy+=AH/2;
    else if(fst.type==='decision')sy+=25;
    // End offsets
    if(tst.type==='end')ey-=17;
    else if(tst.type==='action')ey-=AH/2;
    else if(tst.type==='decision')ey-=25;
    else if(tst.type==='start')ey-=13;

    const backward=(ty < fy-SH*0.6);

    if(Math.abs(sx-ex)<5 && !backward){
      a(`<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey-7}" stroke="#333" stroke-width="1.3" marker-end="${mk}"/>`);
      if(lbl)a(`<text x="${sx+8}" y="${(sy+ey)/2}" font-family="Arial" font-size="10" font-style="italic" fill="#555">${e(lbl)}</text>`);
    } else if(backward){
      const loopX=Math.min(sx,ex)-AW/2-22;
      a(`<polyline points="${sx},${sy} ${loopX},${sy} ${loopX},${ey} ${ex+7},${ey}" fill="none" stroke="#333" stroke-width="1.3" marker-end="${mk}"/>`);
      if(lbl)a(`<text x="${loopX-6}" y="${(sy+ey)/2}" text-anchor="end" font-family="Arial" font-size="10" font-style="italic" fill="#555">${e(lbl)}</text>`);
    } else {
      const midY=(sy+ey)/2;
      a(`<polyline points="${sx},${sy} ${sx},${midY} ${ex},${midY} ${ex},${ey-7}" fill="none" stroke="#333" stroke-width="1.3" marker-end="${mk}"/>`);
      if(lbl)a(`<text x="${(sx+ex)/2}" y="${midY-5}" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic" fill="#555">${e(lbl)}</text>`);
    }
  });
  a(`</svg>`); return s;
}

/* ============================================================
   RENDER
   ============================================================ */
function renderAll(){
  const nav=document.getElementById('nav');
  const main=document.getElementById('main');
  UCS.forEach((uc,idx)=>{
    const btn=document.createElement('button');
    btn.className='tb'+(idx===0?' on':'');
    btn.textContent=uc.title.split(':')[0];
    btn.title=uc.title;
    btn.onclick=()=>{
      document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById('uc'+idx).classList.add('on');
    };
    nav.appendChild(btn);

    const sec=document.createElement('div');
    sec.className='sec'+(idx===0?' on':'');
    sec.id='uc'+idx;
    sec.innerHTML=`
      <div class="sct">${e(uc.title)}</div>
      <div class="pair">
        <div class="dbox">
          <h3>Sequence Diagram</h3>
          <div class="sx">${seqSVG(uc.seq)}</div>
          <p class="cap">Gambar 4.${uc.figSeq}. Sequence Diagram ${e(uc.shortTitle)}</p>
        </div>
        <div class="dbox">
          <h3>Activity Diagram</h3>
          <div class="sx">${actSVG(uc.act)}</div>
          <p class="cap">Gambar 4.${uc.figAct}. Activity Diagram ${e(uc.shortTitle)}</p>
        </div>
      </div>`;
    main.appendChild(sec);
  });
}
renderAll();
